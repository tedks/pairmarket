id: pm-upstream-sui-devstack-consumer-contract
title: Make sui-devstack expose a reusable consumer CLI/profile contract
desc: Move localnet compose/topology/startup/reset/log/status ownership out of pairmarket
  and into sui-devstack. Pairmarket should consume a stable sui-devstack CLI/profile/env
  contract instead of carrying its own docker-compose.localnet.yml and orchestration
  logic.
