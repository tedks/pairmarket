id: pm-privacy-key-server-set
title: SEAL key-server set for MVP
desc: Choose SEAL key-server committee for MVP. Mysten-operated default vs self-hosted
  threshold set. Drives the trust model (who can decrypt under compromise) and the
  auditability story (who logs key-share requests). Should also specify the threshold
  parameters (t-of-n) and the rotation/incident-response process for a server compromise.
