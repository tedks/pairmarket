id: pm-privacy-backfill-access
title: Backfill access for late-joining members
desc: 'When a member is added to a Market mid-life, do they get to read prior-epoch
  content? Default proposal: no -- their joined_epoch gates seal_approve. Alternative:
  creator-initiated rewrap that re-encrypts history under the new epoch''s identity.
  Decision affects the seal_approve_participants predicate, the EncryptedRef write
  path, and Walrus storage cost.'
