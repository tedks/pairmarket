id: pm-types-brand-mint-lint
title: 'Lint: brands minted only via parse'
desc: Enforce that all branded types in core/ are minted only inside parse* functions.
  Implement as a custom eslint rule that bans 'as <Brand>' casts and a __BRAND_MINT__
  marker permitted only inside parse functions. Subagent type-system-strategy sketch
  depends on this for the brand invariant to be load-bearing.
type: task
