id: pm-privacy-resolver-evidence-disclosure
title: Resolver evidence disclosure at settle
desc: 'When a market settles, does the resolver''s P4 evidence flip to all-participants
  automatically, or only on creator opt-in? Affects the RESOLVER_THEN_P policy state
  machine: who is in the policy at which epoch, and whether the epoch bump on settle
  is mandatory.'
