id: pm-wallet-signing-audit-sink
title: Persist custodial signing audit events
desc: 'PR #9 emits typed signing audit events and supports an optional in-memory auditSink,
  but auditSigningDecision itself is intentionally type-only and the default prototype
  path does not durably persist events. Specify and implement the production audit
  sink, retention, failure behavior, and plaintext-free guarantees for accepted and
  rejected custodial signing decisions. Filed from PR #9 council review.'
