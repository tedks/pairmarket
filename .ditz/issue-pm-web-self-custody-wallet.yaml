id: pm-web-self-custody-wallet
title: Add self-custody wallet sign-in to prototype web app
desc: Make the prototype web app prefer browser self-custody sign-in before Twitter
  custodial auth. Add wallet session state, connect/disconnect UI, account panel representation,
  and tests that keep the mock journey working. Twitter custodial sign-in remains
  available as a secondary mocked path and real Twitter backend integration follows
  later.
