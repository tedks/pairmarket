id: pm-move-object-lifecycle
title: Define Move object model and market lifecycle
desc: Specify Sui Move objects for markets, invites, positions, escrow, resolution
  attestations, fees, cancellations, settlement, and payout claims. Decide what lives
  on-chain versus in encrypted metadata and which invariants Move must enforce at
  compile/runtime.
