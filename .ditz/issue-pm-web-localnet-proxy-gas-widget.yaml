id: pm-web-localnet-proxy-gas-widget
title: Fix browser localnet proxy and add faucet gas widget
desc: The browser app can point at a package ID that exists on the CLI localnet while
  Vite proxies /sui-rpc to the wrong default RPC, causing profile creation to fail
  with Dependent package not found on-chain. Load .env.local in Vite proxy config
  and add an Account gas widget for requesting localnet faucet gas.
