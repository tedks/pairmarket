id: pm-privacy-policy-model
title: Specify SEAL policy and Walrus ACL model
desc: Define which market data is public, participant-private, subject-visible, or
  creator-only; how SEAL policy IDs bind to Walrus blobs and Move market objects;
  revocation and invite changes; leakage through metadata, timing, payouts, or access
  attempts; and the threat model boundaries.
