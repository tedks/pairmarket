id: pm-devstack-compose-project-isolation
title: Decide whether pairmarket devstack should derive unique compose project names
desc: 'PR #20 defaults pairmarket''s Sui RPC/faucet/GraphQL host ports to persisted
  free ports, which avoids cross-project port collisions. Concurrent pairmarket worktrees
  still share the default SUI_DEVSTACK_COMPOSE_PROJECT=pairmarket-devstack unless
  callers override it. Decide whether the wrapper should derive a stable per-worktree
  compose project name, or keep the explicit override requirement documented.'
