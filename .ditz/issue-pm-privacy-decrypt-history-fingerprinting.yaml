id: pm-privacy-decrypt-history-fingerprinting
title: Decrypt-history view fingerprinting and step-up requirements
desc: "Per ADR 0002 \xA75: the self-serve 'Decrypt history' view is a sensitive route
  \u2014 an attacker with session access can read the user's history. Decide whether
  step-up auth is sufficient or whether additional defenses (rate limits, bucketed
  timestamps, etc.) are required."
