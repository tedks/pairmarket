id: pm-devstack-random-free-ports
title: Default pairmarket devstack to free local ports
desc: Pairmarket should avoid colliding with other Sui dev projects on shared hosts
  by selecting and persisting free local RPC/faucet/GraphQL ports when no explicit
  SUI_DEVSTACK_* port override is provided. The wrapper should preflight explicit
  or generated ports before binding and document how to inspect/reuse them.
