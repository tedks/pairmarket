id: pm-move-owner-indirection
title: Move OwnerIndirection so custody migration is O(1) per user
desc: "Per ADR 0001 \xA76: docs/design.md keys Market.membership on address and treats
  Position<T> as address-owned. Without a Move OwnerIndirection object that membership/positions
  are keyed against, migrating a user from Custodial(KeyRef) to SelfCustody(SuiAddress)
  requires per-market on-chain transitions. Specify the Move object model for an owner-indirection
  handle and how it integrates with SEAL approval predicates."
