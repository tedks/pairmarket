id: pm-wallet-server-issued-signing-grants
title: Server-issued signing grants and custody cap binding
desc: 'PR #9 validates the runtime shape and scope of SigningGrant.custodyCap, but
  the grant/cap is still caller-provided prototype data. Replace fabricated input
  grants with server-issued or store-looked-up grants/caps, bind them to user/session/market
  policy, and ensure clients cannot mint authority by constructing branded objects.
  Filed from PR #9 council review.'
