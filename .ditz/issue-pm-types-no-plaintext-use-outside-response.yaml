id: pm-types-no-plaintext-use-outside-response
title: 'ESLint rule: Plaintext<T>.use(...) restricted to response-serializer module'
desc: "Per ADR 0002 \xA73: restrict Plaintext<T>.use(...) callsites in the wallet/decrypt
  module to the response-serializer code path. Implement as a custom ESLint rule that
  fails CI when .use( appears outside an allowlisted module. The use() continuation
  is the only escape hatch from the opaque Plaintext<T> wrapper; widening that hatch
  undoes the type-level enforcement."
type: task
component: types
