  comment: 'PR #7 makes Plaintext<T> opaque and adds negative type fixtures for raw-payload
    escape, but intentionally does not implement the custom ESLint allowlist. Remaining
    scope: once Plaintext<T>.use(...) exists, add ESLint enforcement that permits
    the escape hatch only in the response serializer module and fails CI everywhere
    else.'
