title: Pick runtime schema library (zod/io-ts/valibot)
desc: 'Pick the runtime schema library (zod, io-ts, or valibot) used to mint branded
  values at the trust boundary. Criteria: bundle size, brand ergonomics (does the
  inferred output type carry the brand?), error shape for HTTP responses, treeshakability.'
