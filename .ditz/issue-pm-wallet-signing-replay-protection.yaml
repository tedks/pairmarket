id: pm-wallet-signing-replay-protection
title: Replay protection for custodial signing intents
desc: 'PR #9 records nonces in audit events but does not consume or persist them.
  Implement per-user/per-session nonce replay protection for custodial signing intents,
  define retry semantics, and add tests for duplicate nonces across accepted and rejected
  decisions. Filed from PR #9 council review.'
